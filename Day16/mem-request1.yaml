apiVersion: v1
kind: Pod
metadata:
  name: memory-demo-1
  namespace: mem-example

spec:
  containers:
  - name: memory-demo-1
    image: polinux/stress
    resources:
      requests:
        memory: "50Mi"
      limits:
        memory: "200Mi"
    command:
    - stress
    args:
    - --vm
    - "1"
    - --vm-bytes
    - 150M
    - --vm-hang
    - "1"